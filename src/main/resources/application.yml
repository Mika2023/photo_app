spring:
  application:
    name: fgislk-pul-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/photo_routes
    username: photo_user
    password: photo_password
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:/db/master.xml

server:
  servlet:
    context-path: /
  port: 8081